services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: flowmind-backend
    environment:
      DATABASE_URL: sqlite:////app/data/flowmind.db
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      SESSION_SECRET: ${SESSION_SECRET:-flowmind-session-secret}
      JWT_SECRET: ${JWT_SECRET:-flowmind-jwt-secret}
      COOKIE_SAMESITE: lax
      COOKIE_SECURE: "false"
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@flowmind.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-now}
      ADMIN_NAME: ${ADMIN_NAME:-FlowMind Admin}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    ports:
      - "8000:8000"
    volumes:
      - flowmind-data:/app/data
      - flowmind-artifacts:/app/artifacts
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    container_name: flowmind-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      PORT: 3000
      HOSTNAME: 0.0.0.0
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  flowmind-data:
  flowmind-artifacts:
